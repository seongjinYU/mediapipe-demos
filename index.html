<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaPipe Demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --white: #ffffff;
      --black: #0a0a0a;
      --muted: #909090;
      --border: rgba(0,0,0,0.09);
      --card-w: 272px;
      --card-h: 440px;
      --radius: 330px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #fafafa;
      color: var(--black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Background gradient blobs — same as PPT */
    body::before {
      content: '';
      position: fixed;
      top: -220px; right: -220px;
      width: 750px; height: 750px;
      background: radial-gradient(circle, rgba(168,210,248,0.52) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -180px; left: -180px;
      width: 680px; height: 680px;
      background: radial-gradient(circle, rgba(255,234,162,0.52) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* ── Header ── */
    header {
      position: relative; z-index: 10;
      padding: 28px 60px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .meta-group { display: flex; gap: 44px; }

    .meta-item { display: flex; flex-direction: column; gap: 2px; }

    .meta-label {
      font-size: 10px; color: var(--muted);
      letter-spacing: 0.09em; text-transform: uppercase; font-weight: 400;
    }

    .meta-value { font-size: 12.5px; color: var(--black); font-weight: 400; }

    .header-tag {
      font-size: 10.5px; color: var(--muted);
      letter-spacing: 0.13em; text-transform: uppercase;
    }

    /* ── Hero ── */
    .hero {
      position: relative; z-index: 10;
      padding: 40px 60px 32px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-bottom: 1px solid var(--border);
    }

    .hero h1 {
      font-size: clamp(48px, 6vw, 80px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
      white-space: nowrap;
    }

    .hero-sub {
      max-width: 300px;
      text-align: right;
    }

    .hero-sub p {
      font-size: clamp(18px, 2.2vw, 26px);
      color: var(--muted);
      font-weight: 300;
      line-height: 1.6;
    }

    /* ── Carousel Section ── */
    .stage {
      position: relative; z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 100px 0 60px;
    }

    .stage-label {
      font-size: 10.5px;
      color: var(--muted);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 52px;
    }

    /* 3D scene — full width so adjacent cards show */
    .scene {
      perspective: 1200px;
      width: 100%;
      height: var(--card-h);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      user-select: none;
      overflow: visible;
    }
    .scene:active { cursor: grabbing; }

    .cylinder {
      position: relative;
      width: var(--card-w);
      height: var(--card-h);
      transform-style: preserve-3d;
    }

    /* ── Cards ── */
    .card {
      position: absolute;
      width: var(--card-w);
      height: var(--card-h);
      background: #ffffff;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 18px;
      padding: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.45s, opacity 0.45s;
      opacity: 0.38;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      transform-style: flat;
    }

    .card.is-active {
      opacity: 1;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.06),
        0 8px 32px rgba(0,0,0,0.08),
        0 24px 72px rgba(0,0,0,0.09);
    }

    /* Thumbnail */
    .card-thumb {
      width: 100%;
      height: 148px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    /* Body */
    .card-body {
      padding: 20px 24px 22px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    /* Number circle — like PPT */
    .card-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .card-num {
      width: 34px; height: 34px;
      border: 1.5px solid var(--black);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11.5px; font-weight: 700;
      letter-spacing: 0.01em;
      flex-shrink: 0;
    }

    .card-tech {
      font-size: 9.5px;
      color: var(--muted);
      letter-spacing: 0.13em;
      text-transform: uppercase;
      font-weight: 400;
    }

    /* Divider line */
    .card-line {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin-bottom: 18px;
      flex-shrink: 0;
    }

    .card-title {
      font-size: 19px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.03em;
      margin-bottom: 10px;
    }

    .card-desc {
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.72;
      font-weight: 300;
      flex: 1;
    }

    .card-play {
      margin-top: 22px;
      display: block;
      padding: 11px 0;
      border: 1.5px solid var(--black);
      border-radius: 9px;
      text-align: center;
      text-decoration: none;
      color: var(--black);
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      transition: background 0.18s, color 0.18s;
      opacity: 0;
      pointer-events: none;
      flex-shrink: 0;
    }

    .card.is-active .card-play {
      opacity: 1;
      pointer-events: all;
    }

    .card-play:hover {
      background: var(--black);
      color: var(--white);
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 100px;
      position: relative;
      z-index: 20;
    }

    .ctrl {
      width: 38px; height: 38px;
      border: 1.5px solid rgba(0,0,0,0.13);
      border-radius: 50%;
      background: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.18s, background 0.18s, color 0.18s;
      color: var(--black);
    }

    .ctrl:hover {
      border-color: var(--black);
      background: var(--black);
      color: var(--white);
    }

    .ctrl svg {
      width: 13px; height: 13px;
      fill: none; stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round;
    }

    .dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .dot {
      height: 6px; width: 6px;
      border-radius: 50%;
      background: rgba(0,0,0,0.14);
      cursor: pointer;
      transition: background 0.25s, width 0.25s, border-radius 0.25s;
    }

    .dot.is-active {
      background: var(--black);
      width: 20px;
      border-radius: 3px;
    }

    /* ── Footer ── */
    footer {
      position: relative; z-index: 10;
      padding: 20px 60px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    footer p {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>


<section class="hero">
  <h1>MediaPipe Demos</h1>
  <div class="hero-sub">
    <p>카메라 하나로 즐기는 <br>인터랙티브 체험</p>
  </div>
</section>

<section class="stage">
<div class="scene" id="scene">
    <div class="cylinder" id="cylinder"></div>
  </div>

  <div class="controls">
    <button class="ctrl" id="prev" aria-label="이전">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="dots" id="dots"></div>
    <button class="ctrl" id="next" aria-label="다음">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</section>


<script>
  const DATA = [
    {
      num: '01', title: '공중 드로잉',
      desc: '손가락 끝으로 허공에 선을 그려보세요. 색상과 굵기를 자유롭게 바꾸며 공중에 그림을 남길 수 있어요.',
      tech: 'Hand Tracking', href: 'air_drawing.html', accent: '#aecff5',
      thumb: 'thumbnails/air-drawing.png',
    },
    {
      num: '02', title: '손가락 총 게임',
      desc: '손으로 총 모양을 만들어 날아오는 공을 맞춰보세요. 반응속도가 점수를 결정합니다.',
      tech: 'Hand Tracking', href: 'ball-game.html', accent: '#f5d98a',
      thumb: 'thumbnails/ball-game.png',
    },
    {
      num: '03', title: '복싱 게임',
      desc: '두 주먹을 날려 3D 캐릭터를 쓰러뜨리세요. 좌우 잽과 스트레이트가 실시간으로 인식됩니다.',
      tech: 'Pose Detection', href: 'boxing-game.html', accent: '#f0b8b8',
      thumb: 'thumbnails/boxing.png',
    },
    {
      num: '04', title: '댄스 게임',
      desc: '음악에 맞춰 몸을 움직여 포즈를 맞춰보세요. 리듬감과 순발력이 점수를 결정합니다.',
      tech: 'Pose Detection', href: 'dance.html', accent: '#c5b8f2',
      thumb: 'thumbnails/dance.png',
    },
    {
      num: '05', title: 'Face 3D Parallax',
      desc: '얼굴 방향을 인식해 화면 속 3D 오브젝트가 시차 효과로 움직입니다.',
      tech: 'Face Landmark', href: 'face-3d.html', accent: '#a8e8d4',
      thumb: 'thumbnails/face3d.png',
    },
    {
      num: '06', title: 'Neck Guard',
      desc: '목과 어깨 자세를 실시간으로 분석해 거북목을 예방합니다. 오래 앉아 있을 때 특히 유용해요.',
      tech: 'Pose Detection', href: 'posture-guard.html', accent: '#c4c4c4',
      thumb: 'thumbnails/neckguard.png',
    },
  ];

  const N = DATA.length;
  const STEP = 360 / N;
  const R = 300; // cylinder radius px

  let current = 0;

  const cylinder = document.getElementById('cylinder');
  const dotsEl   = document.getElementById('dots');

  // Build cards + dots
  DATA.forEach((d, i) => {
    // Card
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' is-active' : '');
    card.style.transform = `rotateY(${i * STEP}deg) translateZ(${R}px)`;
    card.innerHTML = `
      <div class="card-thumb">
        <img src="${d.thumb}" alt="${d.title}">
      </div>
      <div class="card-body">
        <div class="card-meta">
          <div class="card-num">${d.num}</div>
          <span class="card-tech">${d.tech}</span>
        </div>
        <div class="card-line"></div>
        <div class="card-title">${d.title}</div>
        <div class="card-desc">${d.desc}</div>
        <a class="card-play" href="${d.href}">Play</a>
      </div>
    `;
    cylinder.appendChild(card);

    // Dot
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' is-active' : '');
    dotsEl.appendChild(dot);
  });

  const cards = cylinder.querySelectorAll('.card');
  const dots  = dotsEl.querySelectorAll('.dot');

  let targetAngle = 0;
  let displayAngle = 0;
  const AUTO_SPEED = 0.15; // degrees per frame (~6s per card at 60fps)
  let pauseUntil = 0;

  function updateActive() {
    cards.forEach((c, j) => c.classList.toggle('is-active', j === current));
    dots.forEach((d, j)  => d.classList.toggle('is-active',  j === current));
  }

  function getActiveCard(angle) {
    return ((Math.round(-angle / STEP) % N) + N) % N;
  }

  function navigate(dir) {
    const snapped = Math.round(targetAngle / STEP) * STEP;
    targetAngle = snapped - dir * STEP;
    current = getActiveCard(targetAngle);
    updateActive();
    pauseUntil = Date.now() + 3000;
  }

  function goToIndex(target) {
    const snappedCurrent = ((Math.round(-targetAngle / STEP) % N) + N) % N;
    const steps = ((target - snappedCurrent + N) % N);
    if (steps === 0) return;
    const snapped = Math.round(targetAngle / STEP) * STEP;
    targetAngle = snapped - steps * STEP;
    current = target;
    updateActive();
    pauseUntil = Date.now() + 3000;
  }

  function animLoop() {
    requestAnimationFrame(animLoop);
    if (Date.now() >= pauseUntil) {
      targetAngle -= AUTO_SPEED;
    }
    displayAngle += (targetAngle - displayAngle) * 0.12;
    cylinder.style.transform = `rotateY(${displayAngle}deg)`;

    const newCurrent = getActiveCard(displayAngle);
    if (newCurrent !== current && Date.now() >= pauseUntil) {
      current = newCurrent;
      updateActive();
    }
  }
  animLoop();

  dots.forEach((d, i) => d.addEventListener('click', () => goToIndex(i)));

  document.getElementById('prev').addEventListener('click', () => navigate(-1));
  document.getElementById('next').addEventListener('click', () => navigate(+1));

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  navigate(-1);
    if (e.key === 'ArrowRight') navigate(+1);
  });

  // Scroll (wheel)
  let wheelCooldown = false;
  window.addEventListener('wheel', e => {
    e.preventDefault();
    if (wheelCooldown) return;
    const delta = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
    if (Math.abs(delta) < 20) return;
    wheelCooldown = true;
    navigate(delta > 0 ? 1 : -1);
    setTimeout(() => { wheelCooldown = false; }, 600);
  }, { passive: false });

  // Touch swipe
  const scene = document.getElementById('scene');
  let dragX = null;

  scene.addEventListener('touchstart', e => { dragX = e.touches[0].clientX; }, { passive: true });
  scene.addEventListener('touchmove', e => { e.preventDefault(); }, { passive: false });
  window.addEventListener('touchend',  e => {
    if (dragX === null) return;
    const d = dragX - e.changedTouches[0].clientX;
    if (Math.abs(d) > 44) navigate(d > 0 ? 1 : -1);
    dragX = null;
  });
</script>
</body>
</html>
