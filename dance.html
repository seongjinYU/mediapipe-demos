<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>댄스 게임</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d1a; width: 100vw; height: 100vh; overflow: hidden; font-family: sans-serif; color: white; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    #video { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }

    #camView {
      position: absolute; bottom: 90px; left: 20px;
      width: 200px; height: 150px; border-radius: 12px; overflow: hidden;
      border: 2px solid rgba(255,255,255,0.12); z-index: 30;
      transform: scaleX(-1); box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      display: none;
    }

    /* ── 공통 오버레이 ── */
    .screen {
      position: absolute; inset: 0; z-index: 60;
      background: rgba(6,6,18,0.93); backdrop-filter: blur(12px);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    }
    .screen.hidden { display: none; }

    h1 { font-size: 42px; font-weight: 900; }
    .sub { color: rgba(255,255,255,0.45); font-size: 14px; text-align: center; line-height: 1.8; }

    .btn {
      padding: 13px 36px; border-radius: 30px; border: none;
      font-size: 16px; font-weight: 700; cursor: pointer;
      transition: opacity 0.18s, transform 0.1s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-primary { background: linear-gradient(135deg, #4d96ff, #c77dff); color: white; }
    .btn-red     { background: linear-gradient(135deg, #ff6b6b, #c77dff); color: white; }
    .btn-green   { background: linear-gradient(135deg, #6bcb77, #4d96ff); color: white; }
    .btn-ghost   { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }

    .btn-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center; }

    /* ── 홈 ── */
    #homeScreen .menu-cards {
      display: flex; gap: 20px; margin-top: 8px;
    }
    .menu-card {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 28px 36px; cursor: pointer; text-align: center;
      transition: background 0.2s, transform 0.15s; min-width: 160px;
    }
    .menu-card:hover { background: rgba(255,255,255,0.1); transform: translateY(-4px); }
    .menu-card .icon { font-size: 40px; margin-bottom: 10px; }
    .menu-card .label { font-size: 16px; font-weight: 700; }
    .menu-card .desc  { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 4px; }

    /* ── 녹화 ── */
    #recStatus {
      position: absolute; top: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); padding: 8px 24px; border-radius: 24px;
      font-size: 14px; z-index: 40; backdrop-filter: blur(8px);
      white-space: nowrap; border-left: 3px solid #555;
      transition: border-color 0.3s; display: none;
    }
    #recIndicator {
      position: absolute; top: 24px; right: 24px;
      display: none; align-items: center; gap: 8px;
      background: rgba(0,0,0,0.6); padding: 8px 16px;
      border-radius: 20px; font-size: 13px; font-weight: 700; z-index: 40;
    }
    #recIndicator .dot {
      width: 10px; height: 10px; border-radius: 50%; background: #ff6b6b;
      animation: blink 0.8s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    #recTimer { color: #ff6b6b; font-size: 18px; font-weight: 800; font-variant-numeric: tabular-nums; }

    #recControls {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      display: none; gap: 12px; z-index: 40;
    }

    /* ── 게임 HUD ── */
    #gameHud {
      position: absolute; top: 20px; left: 0; right: 0;
      display: none; justify-content: space-between; padding: 0 24px; z-index: 40; pointer-events: none;
    }
    .hud-box {
      background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.08);
      padding: 8px 20px; border-radius: 14px; backdrop-filter: blur(8px); text-align: center;
    }
    .hud-label { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 2px; text-transform: uppercase; }
    .hud-value { font-size: 26px; font-weight: 800; line-height: 1.3; }

    #verdict {
      position: absolute; top: 38%; left: 50%; transform: translate(-50%, -50%);
      font-size: 52px; font-weight: 900; z-index: 40; pointer-events: none;
      opacity: 0; transition: opacity 0.1s; text-shadow: 0 0 30px currentColor;
    }
    #progressBar {
      position: absolute; bottom: 0; left: 0; right: 0; height: 5px;
      background: rgba(255,255,255,0.08); z-index: 40; display: none;
    }
    #progressFill {
      height: 100%; width: 0%; background: linear-gradient(90deg, #4d96ff, #c77dff);
      transition: width 0.1s linear;
    }

    #legend {
      position: absolute; top: 80px; right: 24px;
      background: rgba(0,0,0,0.55); padding: 10px 16px;
      border-radius: 12px; font-size: 12px; z-index: 40;
      backdrop-filter: blur(8px); line-height: 2; display: none;
    }
    .leg-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }

    /* ── 카운트다운 ── */
    #countdown {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 120px; font-weight: 900; z-index: 70;
      text-shadow: 0 0 40px rgba(199,125,255,0.8); display: none;
    }
    @keyframes cpulse {
      0%   { transform: translate(-50%,-50%) scale(1.4); opacity: 0; }
      30%  { opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
    }

    /* ── 결과 ── */
    #resultScreen .final-score { font-size: 80px; font-weight: 900; }
    #resultScreen .grade { font-size: 24px; color: rgba(255,255,255,0.6); }
    .divider { width: 60px; height: 2px; background: rgba(255,255,255,0.15); border-radius: 2px; }
  </style>
</head>
<body>
<video id="video" autoplay playsinline></video>
<video id="camView" autoplay playsinline muted></video>
<canvas id="poseCanvas"></canvas>

<!-- 홈 -->
<div id="homeScreen" class="screen">
  <h1>💃 댄스 게임</h1>
  <p class="sub">먼저 춤을 녹화하고, 직접 따라하며 점수를 내보세요</p>
  <div class="menu-cards">
    <div class="menu-card" id="goRecord">
      <div class="icon">🎬</div>
      <div class="label">녹화하기</div>
      <div class="desc">내 춤을 교본으로 저장</div>
    </div>
    <div class="menu-card" id="goPlay">
      <div class="icon">🕹️</div>
      <div class="label">게임하기</div>
      <div class="desc">저장된 파일로 도전</div>
    </div>
  </div>
</div>

<!-- 녹화 준비 -->
<div id="recordReadyScreen" class="screen">
  <h1>🎬 녹화 준비</h1>
  <p class="sub">시작하면 3초 카운트다운 후 녹화가 시작돼요<br>몸 전체가 카메라에 보이도록 서주세요</p>
  <div class="btn-row">
    <button class="btn btn-red" id="btnRecStart">● 녹화 시작</button>
    <button class="btn btn-ghost" id="btnRecBack">← 뒤로</button>
  </div>
</div>

<!-- 녹화 후 선택 -->
<div id="recordDoneScreen" class="screen hidden">
  <h1>✅ 녹화 완료!</h1>
  <div id="recSummary" class="sub"></div>
  <div class="divider"></div>
  <div class="btn-row">
    <button class="btn btn-primary" id="btnPlayNow">▶ 바로 게임하기</button>
    <button class="btn btn-green"   id="btnSaveJson">💾 JSON 저장</button>
    <button class="btn btn-ghost"   id="btnRecAgain">↺ 다시 녹화</button>
  </div>
</div>

<!-- 파일 로드 -->
<div id="loadScreen" class="screen hidden">
  <h1>📂 파일 불러오기</h1>
  <p class="sub">녹화해서 저장한 JSON 파일을 선택하세요</p>
  <label style="display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.07);border:2px dashed rgba(255,255,255,0.2);padding:16px 32px;border-radius:16px;cursor:pointer;font-size:15px;">
    📂 JSON 파일 선택
    <input type="file" id="fileInput" accept=".json" style="display:none" />
  </label>
  <div id="loadStatus" style="font-size:13px;color:#6bcb77;display:none"></div>
  <div class="btn-row">
    <button class="btn btn-primary" id="btnLoadPlay" disabled>▶ 게임 시작</button>
    <button class="btn btn-ghost"   id="btnLoadBack">← 뒤로</button>
  </div>
</div>

<!-- 결과 -->
<div id="resultScreen" class="screen hidden">
  <h1>🎉 완료!</h1>
  <div class="final-score" id="finalScore"></div>
  <div class="grade" id="finalGrade"></div>
  <div class="divider"></div>
  <div class="btn-row">
    <button class="btn btn-primary" id="btnResultRetry">↺ 다시 하기</button>
    <button class="btn btn-ghost"   id="btnResultHome">🏠 홈으로</button>
  </div>
</div>

<!-- 게임 HUD (항상 위에 있음) -->
<div id="gameHud">
  <div class="hud-box">
    <div class="hud-label">Score</div>
    <div class="hud-value" id="scoreVal" style="color:#ffd93d">0</div>
  </div>
  <div class="hud-box">
    <div class="hud-label">Combo</div>
    <div class="hud-value" id="comboVal" style="color:#c77dff">0</div>
  </div>
</div>

<div id="legend">
  <span class="leg-dot" style="background:rgba(77,150,255,0.7)"></span>기준 포즈<br>
  <span class="leg-dot" style="background:#6bcb77"></span>내 포즈
</div>

<div id="verdict"></div>
<div id="progressBar"><div id="progressFill"></div></div>

<!-- 녹화 중 UI -->
<div id="recStatus"></div>
<div id="recIndicator"><div class="dot"></div>REC &nbsp;<span id="recTimer">0.0s</span></div>
<div id="recControls">
  <button class="btn btn-red" id="btnRecStop">■ 녹화 중지</button>
</div>

<!-- 카운트다운 -->
<div id="countdown"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

<script>
// ── 요소 ─────────────────────────────────────────────
const video      = document.getElementById('video');
const camView    = document.getElementById('camView');
const canvas     = document.getElementById('poseCanvas');
const ctx        = canvas.getContext('2d');
const verdictEl  = document.getElementById('verdict');
const countdownEl= document.getElementById('countdown');
const recStatusEl= document.getElementById('recStatus');
const recIndEl   = document.getElementById('recIndicator');
const recTimerEl = document.getElementById('recTimer');
const recCtrlEl  = document.getElementById('recControls');
const progressFill = document.getElementById('progressFill');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ── 상태 ─────────────────────────────────────────────
const STATE = { HOME:'home', REC_READY:'rec_ready', RECORDING:'recording', REC_DONE:'rec_done', LOAD:'load', COUNTDOWN:'countdown', PLAYING:'playing', RESULT:'result' };
let state = STATE.HOME;

let danceData      = null;   // 게임에 쓸 포즈 데이터
let recordedFrames = [];
let isRecording    = false;
let recStart       = 0;
let recInterval    = null;
let liveLandmarks  = null;

let gameStart = 0, score = 0, combo = 0, scoredFrames = 0;
let verdictTimeout = null, lastVerdictTime = 0;

// ── 화면 전환 ─────────────────────────────────────────
const screens = {
  home:      document.getElementById('homeScreen'),
  rec_ready: document.getElementById('recordReadyScreen'),
  rec_done:  document.getElementById('recordDoneScreen'),
  load:      document.getElementById('loadScreen'),
  result:    document.getElementById('resultScreen'),
};

function goTo(s) {
  state = s;
  Object.entries(screens).forEach(([key, el]) => el.classList.toggle('hidden', key !== s));

  const isGame    = s === STATE.PLAYING;
  const isRec     = s === STATE.RECORDING;
  const showCam   = [STATE.RECORDING, STATE.PLAYING, STATE.COUNTDOWN].includes(s);

  document.getElementById('gameHud').style.display    = isGame ? 'flex' : 'none';
  document.getElementById('legend').style.display     = isGame ? 'block' : 'none';
  document.getElementById('progressBar').style.display= isGame ? 'block' : 'none';
  recStatusEl.style.display  = isRec ? 'block' : 'none';
  recIndEl.style.display     = isRec ? 'flex'  : 'none';
  recCtrlEl.style.display    = isRec ? 'flex'  : 'none';
  camView.style.display      = showCam ? 'block' : 'none';

  if (s === STATE.HOME) verdictEl.style.opacity = '0';
}

// ── 포즈 연결선 ──────────────────────────────────────
const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,7],[0,4],[4,5],[5,6],[6,8],[9,10],
  [11,12],[11,13],[13,15],[15,17],[15,19],[15,21],[17,19],
  [12,14],[14,16],[16,18],[16,20],[16,22],[18,20],
  [11,23],[12,24],[23,24],
  [23,25],[25,27],[27,29],[29,31],[27,31],
  [24,26],[26,28],[28,30],[30,32],[28,32],
];

const JOINT_TRIPLETS = [
  [11,13,15],[12,14,16],
  [23,11,13],[24,12,14],
  [11,23,25],[12,24,26],
  [23,25,27],[24,26,28],
];

function lmPx(lm, xKey='x', yKey='y') {
  return { x: (1 - lm[xKey]) * canvas.width, y: lm[yKey] * canvas.height };
}

function drawSkeleton(lms, lineColor, dotColor, alpha, xKey='x', yKey='y', visKey='visibility') {
  for (const [a, b] of CONNECTIONS) {
    const vis = Math.min(lms[a][visKey] ?? 1, lms[b][visKey] ?? 1);
    if (vis < 0.25) continue;
    const pa = lmPx(lms[a], xKey, yKey), pb = lmPx(lms[b], xKey, yKey);
    ctx.save();
    ctx.strokeStyle = lineColor; ctx.lineWidth = 2.5;
    ctx.shadowColor = lineColor; ctx.shadowBlur = 10;
    ctx.globalAlpha = Math.min(vis * alpha, 0.95);
    ctx.beginPath(); ctx.moveTo(pa.x, pa.y); ctx.lineTo(pb.x, pb.y); ctx.stroke();
    ctx.restore();
  }
  for (let i = 0; i < lms.length; i++) {
    const lm = lms[i], vis = lm[visKey] ?? 1;
    if (vis < 0.25) continue;
    const p = lmPx(lm, xKey, yKey);
    const r = [11,12,23,24].includes(i) ? 8 : 5;
    ctx.save();
    ctx.fillStyle = dotColor; ctx.shadowColor = dotColor; ctx.shadowBlur = 14;
    ctx.globalAlpha = Math.min(vis * alpha, 1);
    ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

// ── 각도 비교 ─────────────────────────────────────────
function calcAngle(lms, a, b, c, xKey='x', yKey='y') {
  const A = lms[a], B = lms[b], C = lms[c];
  const BAx = A[xKey]-B[xKey], BAy = A[yKey]-B[yKey];
  const BCx = C[xKey]-B[xKey], BCy = C[yKey]-B[yKey];
  const dot = BAx*BCx + BAy*BCy;
  const mag = Math.hypot(BAx, BAy) * Math.hypot(BCx, BCy);
  if (mag < 0.0001) return 0;
  return Math.acos(Math.max(-1, Math.min(1, dot/mag))) * 180 / Math.PI;
}

function compareAngles(refLms, liveLms) {
  let total = 0, count = 0;
  for (const [a,b,c] of JOINT_TRIPLETS) {
    const rv = Math.min(refLms[a].v??1, refLms[b].v??1, refLms[c].v??1);
    const lv = Math.min(liveLms[a].visibility??1, liveLms[b].visibility??1, liveLms[c].visibility??1);
    if (rv < 0.4 || lv < 0.4) continue;
    total += Math.abs(calcAngle(refLms,a,b,c,'x','y') - calcAngle(liveLms,a,b,c,'x','y'));
    count++;
  }
  return count === 0 ? 999 : total / count;
}

function getVerdict(diff) {
  if (diff < 15) return { label:'PERFECT!', pts:100, color:'#ffd93d' };
  if (diff < 28) return { label:'GOOD',     pts:70,  color:'#6bcb77' };
  if (diff < 42) return { label:'OK',        pts:40,  color:'#4d96ff' };
  return               { label:'MISS',      pts:0,   color:'#ff6b6b' };
}

function getRefFrame(t) {
  const frames = danceData.frames;
  let lo = 0, hi = frames.length - 1;
  while (lo < hi) { const mid=(lo+hi+1)>>1; if(frames[mid].t<=t) lo=mid; else hi=mid-1; }
  return frames[lo];
}

// ── 카운트다운 유틸 ───────────────────────────────────
function showCountdown(n, cb) {
  countdownEl.style.display = 'block';
  countdownEl.textContent = n === 0 ? 'GO!' : n;
  countdownEl.style.animation = 'none';
  countdownEl.offsetHeight;
  countdownEl.style.animation = 'cpulse 1s ease-in-out';
  if (n > 0) setTimeout(() => showCountdown(n-1, cb), 1000);
  else        setTimeout(() => { countdownEl.style.display='none'; cb(); }, 600);
}

// ── 판정 표시 ─────────────────────────────────────────
function showVerdict(v) {
  const now = performance.now();
  if (now - lastVerdictTime < 300) return;
  lastVerdictTime = now;
  verdictEl.textContent  = v.label;
  verdictEl.style.color   = v.color;
  verdictEl.style.opacity = '1';
  clearTimeout(verdictTimeout);
  verdictTimeout = setTimeout(() => { verdictEl.style.opacity='0'; }, 600);
}

// ── 포즈 처리 ─────────────────────────────────────────
let frameIdx = 0;

function onResults(results) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  liveLandmarks = results.poseLandmarks ?? null;

  // ── 녹화 중 ──
  if (state === STATE.RECORDING) {
    if (liveLandmarks) {
      drawSkeleton(liveLandmarks, 'rgba(255,100,100,0.85)', '#ff8888', 1);
      const t = performance.now() - recStart;
      recordedFrames.push({
        t: Math.round(t),
        lm: liveLandmarks.map(l => ({
          x: +l.x.toFixed(4), y: +l.y.toFixed(4),
          z: +(l.z??0).toFixed(4), v: +(l.visibility??1).toFixed(3)
        }))
      });
    }
    return;
  }

  // ── 게임 중 ──
  if (state !== STATE.PLAYING || !danceData) return;

  const elapsed = performance.now() - gameStart;
  progressFill.style.width = Math.min(elapsed/danceData.duration*100, 100) + '%';

  if (elapsed >= danceData.duration) { endGame(); return; }

  const refFrame = getRefFrame(elapsed);

  // 기준 포즈 (파란 고스트)
  drawSkeleton(refFrame.lm, 'rgba(77,150,255,0.5)', 'rgba(77,150,255,0.7)', 0.7, 'x','y','v');

  // 내 포즈 (초록)
  if (liveLandmarks) {
    drawSkeleton(liveLandmarks, 'rgba(107,203,119,0.9)', '#6bcb77', 1);

    scoredFrames++;
    const diff    = compareAngles(refFrame.lm, liveLandmarks);
    const verdict = getVerdict(diff);
    score += verdict.pts;
    combo  = verdict.label === 'MISS' ? 0 : combo + 1;

    document.getElementById('scoreVal').textContent = Math.round(score/scoredFrames);
    document.getElementById('comboVal').textContent = combo;

    if (scoredFrames % 15 === 0) showVerdict(verdict);
  }
}

function endGame() {
  state = STATE.RESULT;
  document.getElementById('gameHud').style.display = 'none';
  document.getElementById('legend').style.display  = 'none';
  document.getElementById('progressBar').style.display = 'none';
  camView.style.display = 'none';
  verdictEl.style.opacity = '0';
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const avg = scoredFrames > 0 ? Math.round(score/scoredFrames) : 0;
  const fs = document.getElementById('finalScore');
  fs.textContent = avg + '점';
  fs.style.color = avg>=80?'#ffd93d':avg>=60?'#6bcb77':avg>=40?'#4d96ff':'#ff6b6b';
  document.getElementById('finalGrade').textContent =
    avg>=90?'🏆 PERFECT DANCER!':avg>=75?'🥇 GREAT!':avg>=60?'🥈 GOOD!':avg>=40?'🥉 KEEP PRACTICING':'💪 TRY AGAIN';

  screens.result.classList.remove('hidden');
}

// ── 게임 시작 ─────────────────────────────────────────
function startGame(data) {
  danceData    = data;
  score        = 0; combo = 0; scoredFrames = 0;
  lastVerdictTime = 0;
  document.getElementById('scoreVal').textContent = '0';
  document.getElementById('comboVal').textContent = '0';
  progressFill.style.width = '0%';
  verdictEl.style.opacity  = '0';
  camView.style.display    = 'block';

  Object.values(screens).forEach(el => el.classList.add('hidden'));
  state = STATE.COUNTDOWN;

  showCountdown(3, () => {
    state     = STATE.PLAYING;
    gameStart = performance.now();
    document.getElementById('gameHud').style.display = 'flex';
    document.getElementById('legend').style.display  = 'block';
    document.getElementById('progressBar').style.display = 'block';
  });
}

// ── 녹화 ─────────────────────────────────────────────
function startRecording() {
  recordedFrames = [];
  isRecording    = true;
  recStart       = performance.now();
  goTo(STATE.RECORDING);
  recStatusEl.style.borderLeftColor = '#ff6b6b';
  recStatusEl.textContent = '🔴 녹화 중 — 마음껏 춤추세요!';

  recInterval = setInterval(() => {
    recTimerEl.textContent = ((performance.now()-recStart)/1000).toFixed(1)+'s';
  }, 100);
}

function stopRecording() {
  isRecording = false;
  clearInterval(recInterval);

  const data = {
    createdAt: new Date().toISOString(),
    duration:  recordedFrames.length > 0 ? recordedFrames[recordedFrames.length-1].t : 0,
    frameCount: recordedFrames.length,
    frames: recordedFrames
  };
  danceData = data;

  const dur = (data.duration/1000).toFixed(1);
  document.getElementById('recSummary').textContent = `${data.frameCount}프레임 · ${dur}초 녹화됨`;
  goTo(STATE.REC_DONE);
}

// ── 버튼 이벤트 ───────────────────────────────────────
document.getElementById('goRecord').addEventListener('click', () => goTo(STATE.REC_READY));
document.getElementById('goPlay').addEventListener('click',   () => { goTo(STATE.LOAD); });
document.getElementById('btnRecBack').addEventListener('click', () => goTo(STATE.HOME));

document.getElementById('btnRecStart').addEventListener('click', () => {
  camView.style.display = 'block';
  Object.values(screens).forEach(el => el.classList.add('hidden'));
  state = STATE.COUNTDOWN;
  showCountdown(3, startRecording);
});

document.getElementById('btnRecStop').addEventListener('click', stopRecording);

document.getElementById('btnPlayNow').addEventListener('click', () => {
  if (danceData) startGame(danceData);
});

document.getElementById('btnSaveJson').addEventListener('click', () => {
  if (!danceData) return;
  const blob = new Blob([JSON.stringify(danceData,null,2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `dance_${Date.now()}.json`; a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('btnRecAgain').addEventListener('click', () => {
  danceData = null;
  goTo(STATE.REC_READY);
});

// 파일 불러오기
document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      danceData = data;
      const dur = (data.duration/1000).toFixed(1);
      document.getElementById('loadStatus').style.display = 'block';
      document.getElementById('loadStatus').textContent = `✅ ${file.name} — ${data.frameCount}프레임 / ${dur}초`;
      document.getElementById('btnLoadPlay').disabled = false;
    } catch { alert('파일을 읽을 수 없어요.'); }
  };
  reader.readAsText(file);
});

document.getElementById('btnLoadPlay').addEventListener('click', () => {
  if (danceData) startGame(danceData);
});
document.getElementById('btnLoadBack').addEventListener('click', () => {
  document.getElementById('btnLoadPlay').disabled = true;
  document.getElementById('loadStatus').style.display = 'none';
  danceData = null;
  goTo(STATE.HOME);
});

document.getElementById('btnResultRetry').addEventListener('click', () => {
  screens.result.classList.add('hidden');
  startGame(danceData);
});
document.getElementById('btnResultHome').addEventListener('click', () => {
  danceData = null;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  goTo(STATE.HOME);
});

// ── MediaPipe 초기화 ─────────────────────────────────
const pose = new Pose({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
pose.setOptions({ modelComplexity:1, smoothLandmarks:true, enableSegmentation:false, minDetectionConfidence:0.5, minTrackingConfidence:0.5 });
pose.onResults(onResults);

navigator.mediaDevices.getUserMedia({ video: { width:640, height:480 } })
  .then(stream => {
    video.srcObject   = stream;
    camView.srcObject = stream;
    async function sendFrame() {
      if (video.readyState >= 2) await pose.send({ image: video });
      requestAnimationFrame(sendFrame);
    }
    video.addEventListener('loadeddata', sendFrame);
  })
  .catch(err => alert('카메라 오류: ' + err.message));
</script>
</body>
</html>
